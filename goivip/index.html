<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Đăng Ký Gói VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS from CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center min-h-screen text-white">
  <div class="text-center">
    <h1 class="text-2xl font-bold mb-6">ĐĂNG KÝ GÓI GÓI THUÊ BAO CẬP NHẬP DỮ LIỆU</h1>

    <div class="space-y-4">

      <!-- 1-Year Plan -->
      <div class="bg-white rounded-lg shadow-lg p-4">
        <h2 class="fancy-frame mb-2">MUA GÓI THUÊ BAO 1 NĂM</h2>
        <button
          class="bg-purple-500 text-white font-bold py-2 px-4 rounded transition-colors duration-300 ease-in-out hover:bg-purple-700"
          onclick="toggleCodeInput(this)"
        >
          Đăng Ký Ngay
        </button>
        <div class="hidden mt-2">
          <input
            type="password"
            placeholder="Nhập mã"
            class="border border-gray-300 rounded py-2 px-4 mb-2 text-black"
          />
          <button
            class="bg-green-500 text-white font-bold py-2 px-4 rounded transition-colors duration-300 ease-in-out hover:bg-green-700"
            onclick="activateCode(this)"
          >
            Kích Hoạt
          </button>
        </div>
      </div>

      <!-- 2-Year Plan -->
      <div class="bg-white rounded-lg shadow-lg p-4">
        <h2 class="fancy-frame mb-2">MUA GÓI THUÊ BAO 2 NĂM</h2>
        <button
          class="bg-purple-500 text-white font-bold py-2 px-4 rounded transition-colors duration-300 ease-in-out hover:bg-purple-700"
          onclick="toggleCodeInput(this)"
        >
          Đăng Ký Ngay
        </button>
        <div class="hidden mt-2">
          <input
            type="password"
            placeholder="Nhập mã"
            class="border border-gray-300 rounded py-2 px-4 mb-2 text-black"
          />
          <button
            class="bg-green-500 text-white font-bold py-2 px-4 rounded transition-colors duration-300 ease-in-out hover:bg-green-700"
            onclick="activateCode(this)"
          >
            Kích Hoạt
          </button>
        </div>
      </div>

      <!-- 5-Year Plan -->
      <div class="bg-white rounded-lg shadow-lg p-4">
        <h2 class="fancy-frame mb-2">MUA GÓI THUÊ BAO 5 NĂM</h2>
        <button
          class="bg-purple-500 text-white font-bold py-2 px-4 rounded transition-colors duration-300 ease-in-out hover:bg-purple-700"
          onclick="toggleCodeInput(this)"
        >
          Đăng Ký Ngay
        </button>
        <div class="hidden mt-2">
          <input
            type="password"
            placeholder="Nhập mã"
            class="border border-gray-300 rounded py-2 px-4 mb-2 text-black"
          />
          <button
            class="bg-green-500 text-white font-bold py-2 px-4 rounded transition-colors duration-300 ease-in-out hover:bg-green-700"
            onclick="activateCode(this)"
          >
            Kích Hoạt
          </button>
        </div>
      </div>

      <!-- Lifetime Plan -->
      <div class="bg-white rounded-lg shadow-lg p-4">
        <h2 class="fancy-frame mb-2">MUA GÓI THUÊ BAO VĨNH VIỄN</h2>
        <button
          class="bg-purple-500 text-white font-bold py-2 px-4 rounded transition-colors duration-300 ease-in-out hover:bg-purple-700"
          onclick="toggleCodeInput(this)"
        >
          Đăng Ký Ngay
        </button>
        <div class="hidden mt-2">
          <input
            type="password"
            placeholder="Nhập mã"
            class="border border-gray-300 rounded py-2 px-4 mb-2 text-black"
          />
          <button
            class="bg-green-500 text-white font-bold py-2 px-4 rounded transition-colors duration-300 ease-in-out hover:bg-green-700"
            onclick="activateCode(this)"
          >
            Kích Hoạt
          </button>
        </div>
      </div>

    </div>
  </div>

  <div
    id="processingModal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center px-6 text-white"
    role="dialog"
    aria-modal="true"
    aria-hidden="true"
  >
    <div class="absolute inset-0 bg-black/40"></div>
    <div class="relative w-full max-w-xl rounded-2xl border border-white/30 bg-black/45 p-8 text-center shadow-2xl backdrop-blur-sm">
      <h2 class="mb-6 text-2xl font-bold uppercase">Đang kích hoạt gói VIP</h2>
      <div class="h-5 w-full overflow-hidden rounded-full bg-white/30">
        <div
          id="modalProgressBar"
          class="h-full rounded-full bg-green-400 transition-[width] duration-100 ease-linear"
          style="width: 0%"
        ></div>
      </div>
      <div class="mt-3 text-lg font-bold text-green-300">
        Loading: <span id="modalLoadingPercentage">0%</span>
      </div>
      <p class="mt-4 text-base font-semibold md:text-lg">
        Hệ thống đang xử lý, vui lòng chờ trong ít phút
      </p>
    </div>
  </div>

  <!-- Custom JS -->
  <script src="base.js"></script>
</body>
</html>
